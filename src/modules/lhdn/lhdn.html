<div class="flex justify-between items-center mb-6">
    <div><h2 class="text-3xl font-black text-orange-600" data-i18n="menu-tax">LHDN Tax Records</h2></div>
    <div><button onclick="document.getElementById('tax-modal').classList.remove('hidden')" class="bg-orange-600 text-white px-6 py-2 rounded-2xl font-bold" data-i18n="btn-record">+ Rekod</button></div>
</div>
<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
    <div class="flux-card p-6 text-center"><p class="text-[10px] font-black text-gray-400 uppercase" data-i18n="tax-total">Total Tuntutan</p><h3 id="tax-total-amt" class="text-2xl font-black text-orange-600">RM 0.00</h3></div>
    <div class="flux-card p-6 text-center"><p class="text-[10px] font-black text-gray-400 uppercase" data-i18n="tax-count">Bilangan Resit</p><h3 id="tax-receipt-count" class="text-2xl font-black text-gray-800">0</h3></div>
    <div class="flux-card p-6 text-center"><p class="text-[10px] font-black text-gray-400 uppercase" data-i18n="tax-top">Kategori Tertinggi</p><h3 id="tax-top-cat" class="text-lg font-black text-gray-800">-</h3></div>
    <div class="flux-card p-6 text-center"><p class="text-[10px] font-black text-gray-400 uppercase" data-i18n="tax-status">Status Audit</p><h3 class="text-lg font-black text-emerald-500"><i class="fas fa-check-circle"></i> <span data-i18n="tax-ok">Tersusun</span></h3></div>
</div>
<div class="flux-card overflow-x-auto">
    <table class="w-full text-left min-w-[600px]">
        <thead class="bg-gray-50/50">
            <tr class="text-[10px] uppercase font-bold text-gray-400">
                <th class="p-6" data-i18n="th-date">Tarikh</th>
                <th class="p-6" data-i18n="th-receipt">Resit</th>
                <th class="p-6" data-i18n="th-category">Kategori</th>
                <th class="p-6" data-i18n="th-vendor">Vendor</th>
                <th class="p-6 text-right" data-i18n="th-amount">Jumlah</th>
                <th class="p-6 text-center" data-i18n="th-action">Tindakan</th>
            </tr>
        </thead>
        <tbody id="tax-table-body"></tbody>
    </table>
</div>
