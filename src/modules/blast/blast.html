<div class="max-w-5xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-black text-emerald-600"><i class="fab fa-whatsapp mr-3"></i>WhatsApp Blast</h2>
        <button onclick="generateCatalogText()" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-xs" data-i18n="blast-cat">KATALOG</button>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
        <div class="lg:col-span-2 flux-card p-6">
            <p class="text-[10px] font-black text-gray-400 uppercase mb-4" data-i18n="blast-select">Pilih Penerima</p>
            <div id="blast-client-list" class="space-y-2 h-[450px] overflow-y-auto"></div>
        </div>
        <div class="lg:col-span-3 space-y-6">
            <div class="flux-card p-6">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-4" data-i18n="blast-msg">Mesej</p>
                <label class="block mb-4 p-4 border-2 border-dashed border-gray-200 rounded-3xl text-center cursor-pointer">
                    <span id="blast-img-status" class="text-xs text-gray-400" data-i18n="blast-img">Gambar</span>
                    <input type="file" id="blast-img-input" class="hidden" accept="image/*">
                </label>
                <textarea id="blast-msg" class="w-full p-5 flux-input h-40 text-sm" placeholder="Hai {name}..."></textarea>
                <!-- Butang akan ditambah oleh JS di sini -->
            </div>
            <div class="flux-card p-6">
                <div class="flex gap-4 mb-6">
                    <div class="flex-1"><p class="text-[10px] font-black text-gray-400 uppercase" data-i18n="blast-delay">Sela (saat)</p><input type="number" id="blast-delay" value="30" class="w-full p-3 flux-input" min="30" max="999"></div>
                </div>
                <button onclick="startBlast()" class="w-full bg-emerald-500 text-white py-5 rounded-[24px] font-black text-lg"><i class="fas fa-paper-plane mr-2"></i> BLAST</button>
            </div>
        </div>
    </div>
</div>
