<div class="fixed inset-0 z-[-1] overflow-hidden bg-gray-50/50 dark:bg-gray-900 pointer-events-none transition-colors duration-500">
    <div class="absolute top-[-5%] left-[-10%] w-[500px] h-[500px] bg-sky-200/40 rounded-full mix-blend-multiply filter blur-[150px] opacity-70"></div>
    <div class="absolute top-[10%] right-[-15%] w-[450px] h-[450px] bg-purple-200/30 rounded-full mix-blend-multiply filter blur-[130px] opacity-60"></div>
    <div class="absolute bottom-[-10%] left-[15%] w-[400px] h-[400px] bg-pink-100/40 rounded-full mix-blend-multiply filter blur-[110px] opacity-50"></div>
</div>

<div class="flex justify-between items-end mb-6 flex-wrap gap-3">
    <div>
        <h2 class="text-3xl md:text-4xl font-black tracking-tight text-gray-800 dark:text-white">Ringkasan Niaga</h2>
        <p class="text-gray-600 dark:text-gray-300 font-medium">Prestasi semasa anda hari ini.</p>
    </div>
    <div class="text-right flex flex-col items-end gap-2">
        <div class="flex bg-white/20 dark:bg-black/10 backdrop-blur-xl p-1 rounded-2xl gap-1 border border-white/60 dark:border-white/5 shadow-sm no-print">
            <button onclick="toggleDarkMode()" id="btn-theme" class="px-4 py-2 rounded-xl text-gray-700 dark:text-gray-200 hover:bg-white/40 dark:hover:bg-gray-700/50 transition text-sm font-bold shadow-sm">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        <p id="current-date-display" class="font-bold text-gray-700 dark:text-gray-300 tracking-widest text-xs drop-shadow-sm"></p>
    </div>
</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <button onclick="loadModule('pos')" class="bg-white/30 dark:bg-black/20 backdrop-blur-xl border border-white/40 dark:border-white/5 p-5 rounded-[28px] flex flex-col items-center justify-center gap-3 shadow-[0_4px_16px_rgba(0,0,0,0.02)] hover:bg-white/50 transition-all group">
        <div class="w-14 h-14 rounded-full bg-gradient-to-br from-emerald-100 to-teal-100 dark:from-emerald-400 dark:to-teal-500 flex items-center justify-center text-emerald-600 dark:text-white shadow-sm group-hover:scale-105 transition-transform"><i class="fas fa-cash-register text-2xl"></i></div>
        <span class="text-xs font-bold text-gray-700 dark:text-gray-200 tracking-tight">Mini POS</span>
    </button>
    <button onclick="loadModule('billing')" class="bg-white/30 dark:bg-black/20 backdrop-blur-xl border border-white/40 dark:border-white/5 p-5 rounded-[28px] flex flex-col items-center justify-center gap-3 shadow-[0_4px_16px_rgba(0,0,0,0.02)] hover:bg-white/50 transition-all group">
        <div class="w-14 h-14 rounded-full bg-gradient-to-br from-blue-100 to-indigo-100 dark:from-blue-400 dark:to-indigo-500 flex items-center justify-center text-blue-600 dark:text-white shadow-sm group-hover:scale-105 transition-transform"><i class="fas fa-file-invoice text-2xl"></i></div>
        <span class="text-xs font-bold text-gray-700 dark:text-gray-200 tracking-tight">Invois Baru</span>
    </button>
    <button onclick="loadModule('inventory')" class="bg-white/30 dark:bg-black/20 backdrop-blur-xl border border-white/40 dark:border-white/5 p-5 rounded-[28px] flex flex-col items-center justify-center gap-3 shadow-[0_4px_16px_rgba(0,0,0,0.02)] hover:bg-white/50 transition-all group">
        <div class="w-14 h-14 rounded-full bg-gradient-to-br from-amber-100 to-orange-100 dark:from-amber-300 dark:to-orange-400 flex items-center justify-center text-amber-600 dark:text-white shadow-sm group-hover:scale-105 transition-transform"><i class="fas fa-box-open text-2xl"></i></div>
        <span class="text-xs font-bold text-gray-700 dark:text-gray-200 tracking-tight">Tambah Stok</span>
    </button>
    <button onclick="loadModule('social')" class="bg-white/30 dark:bg-black/20 backdrop-blur-xl border border-white/40 dark:border-white/5 p-5 rounded-[28px] flex flex-col items-center justify-center gap-3 shadow-[0_4px_16px_rgba(0,0,0,0.02)] hover:bg-white/50 transition-all group">
        <div class="w-14 h-14 rounded-full bg-gradient-to-br from-pink-100 to-rose-100 dark:from-pink-400 dark:to-rose-500 flex items-center justify-center text-pink-600 dark:text-white shadow-sm group-hover:scale-105 transition-transform"><i class="fas fa-share-nodes text-2xl"></i></div>
        <span class="text-xs font-bold text-gray-700 dark:text-gray-200 tracking-tight">Pemasaran</span>
    </button>
</div>

<div id="low-stock-panel" class="mb-8 bg-white/20 dark:bg-red-950/40 backdrop-blur-xl border border-white/40 dark:border-red-500/20 p-6 rounded-[30px] hidden shadow-lg relative overflow-hidden">
    <div class="absolute inset-0 bg-red-100/10 dark:bg-red-900/10 pointer-events-none"></div>
    <div class="flex items-center gap-3 mb-3 relative z-10"><i class="fas fa-exclamation-triangle text-red-500 text-xl animate-pulse"></i><h3 class="font-black text-red-600 dark:text-red-400">⚠️ Stok Kritikal (≤ ambang)</h3></div>
    <div id="low-stock-list" class="space-y-2 text-sm text-gray-800 dark:text-red-200 font-bold relative z-10"></div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
    <div class="lg:col-span-2 bg-white/30 dark:bg-black/20 backdrop-blur-3xl border border-white/40 dark:border-white/5 rounded-[36px] p-8 flex flex-col justify-between shadow-[0_6px_20px_rgba(0,0,0,0.02)] relative overflow-hidden">
        <div class="flex justify-between items-start flex-wrap gap-3 relative z-10">
            <h3 class="text-xs font-bold text-gray-600 dark:text-gray-400 uppercase tracking-widest">Revenue Terkini (Receipt)</h3>
            <div class="flex gap-2">
                <button onclick="loadModule('lhdn')" class="bg-white/40 dark:bg-white/5 hover:bg-white/60 border border-white/60 dark:border-white/10 text-gray-800 dark:text-white px-4 py-2 rounded-full text-xs font-bold tracking-tighter backdrop-blur-md transition shadow-sm"><span>REKOD CUKAI</span> <i class="fas fa-plus"></i></button>
            </div>
        </div>
        <div class="my-6 relative z-10">
            <h1 id="dash-total-rev" class="text-5xl md:text-6xl font-black tracking-tighter drop-shadow-md text-gray-900 dark:text-white">RM 0.00</h1>
            <p class="text-gray-600 dark:text-gray-400 font-medium mt-2">Berdasarkan jualan yang telah dibayar</p>
        </div>
        <div class="grid grid-cols-3 gap-4 border-t border-gray-200 dark:border-gray-800 pt-6 relative z-10">
            <div><p class="text-[9px] font-bold text-gray-500 dark:text-gray-400 uppercase">Margin Untung</p><p id="dash-total-margin" class="text-xl font-black text-emerald-600 dark:text-emerald-400">RM 0.00</p></div>
            <div><p class="text-[9px] font-bold text-gray-500 dark:text-gray-400 uppercase">Belanja (Cukai)</p><p id="dash-tax-expense" class="text-xl font-black text-orange-600 dark:text-orange-400">RM 0.00</p></div>
            <div><p class="text-[9px] font-bold text-gray-500 dark:text-gray-400 uppercase">Total Stok</p><p id="dash-inv-count" class="text-xl font-black text-gray-800 dark:text-white">0 Unit</p></div>
        </div>
    </div>
    
    <div class="bg-white/30 dark:bg-black/20 backdrop-blur-3xl border border-white/40 dark:border-white/5 rounded-[36px] p-6 shadow-[0_6px_20px_rgba(0,0,0,0.02)]">
        <h3 class="font-black text-gray-800 dark:text-white text-lg mb-4"><i class="fas fa-building mr-2 text-indigo-500"></i>Profil Bisnes</h3>
        <div class="space-y-3">
            <div class="flex gap-2">
                <label class="flex-1 bg-white/40 dark:bg-white/5 backdrop-blur-md border border-white/50 dark:border-white/10 p-3 rounded-xl text-center cursor-pointer hover:bg-white/60 transition shadow-sm"><span class="text-[9px] font-bold text-gray-700 dark:text-gray-300">LOGO</span><input type="file" onchange="uploadProfileImg(this, 'logo')" class="hidden"></label>
                <label class="flex-1 bg-white/40 dark:bg-white/5 backdrop-blur-md border border-white/50 dark:border-white/10 p-3 rounded-xl text-center cursor-pointer hover:bg-white/60 transition shadow-sm"><span class="text-[9px] font-bold text-gray-700 dark:text-gray-300">COP</span><input type="file" onchange="uploadProfileImg(this, 'cop')" class="hidden"></label>
                <label class="flex-1 bg-gray-600/10 text-gray-800 backdrop-blur-md border border-gray-400/20 p-3 rounded-xl text-center cursor-pointer hover:bg-gray-600/20 transition shadow-sm"><span class="text-[9px] font-bold">WALLPAPER</span><input type="file" onchange="uploadBgImg(this)" accept="image/*" class="hidden"></label>
            </div>
            <button onclick="removeBgImg()" id="btn-remove-bg" class="w-full text-[9px] font-bold bg-red-500/80 text-white backdrop-blur-md py-2 rounded-xl hidden mb-2 hover:bg-red-600/80 transition shadow-sm"><i class="fas fa-trash"></i> Buang Wallpaper</button>
            <input type="text" id="set-biz-name" oninput="updateBizProfile()" class="w-full p-3 bg-white/40 dark:bg-black/30 border border-white/50 dark:border-white/10 backdrop-blur-md rounded-xl text-xs font-bold text-gray-800 dark:text-white focus:border-indigo-300 outline-none shadow-inner" placeholder="Nama Syarikat">
            <textarea id="set-biz-addr" oninput="updateBizProfile()" class="w-full p-3 bg-white/40 dark:bg-black/30 border border-white/50 dark:border-white/10 backdrop-blur-md rounded-xl text-xs h-16 text-gray-800 dark:text-white focus:border-indigo-300 outline-none custom-scroll shadow-inner" placeholder="Alamat & No. SSM"></textarea>
            <input type="text" id="set-biz-bank" oninput="updateBizProfile()" class="w-full p-3 bg-white/40 dark:bg-black/30 border border-white/50 dark:border-white/10 backdrop-blur-md rounded-xl text-xs font-bold text-gray-800 dark:text-white focus:border-indigo-300 outline-none shadow-inner" placeholder="Bank & No Akaun">
        </div>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
    <div class="lg:col-span-2 bg-white/30 dark:bg-black/20 backdrop-blur-3xl border border-white/40 dark:border-white/5 rounded-[36px] p-6 shadow-[0_6px_20px_rgba(0,0,0,0.02)]">
        <h3 class="font-black text-gray-800 dark:text-white text-lg mb-4"><i class="fas fa-chart-line mr-2 text-blue-500"></i>Tren Jualan</h3>
        <div class="w-full h-48">
            <canvas id="dashboardChart"></canvas>
        </div>
    </div>
    <div class="bg-white/30 dark:bg-black/20 backdrop-blur-3xl border border-white/40 dark:border-white/5 rounded-[36px] p-6 shadow-[0_6px_20px_rgba(0,0,0,0.02)] flex flex-col">
        <h3 class="font-black text-gray-800 dark:text-white text-lg mb-4"><i class="fas fa-bolt mr-2 text-amber-500"></i>Aktiviti Terkini</h3>
        <div id="recent-activity-list" class="space-y-3 flex-1 overflow-y-auto custom-scroll pr-2">
            </div>
        <button onclick="loadModule('history')" class="mt-4 w-full bg-white/40 dark:bg-white/5 hover:bg-white/60 border border-white/60 dark:border-white/10 p-3 rounded-xl text-[10px] font-bold text-gray-700 dark:text-gray-300 uppercase shadow-sm">Lihat Semua Sejarah <i class="fas fa-arrow-right"></i></button>
    </div>
</div>

<div class="bg-white/30 dark:bg-black/20 backdrop-blur-3xl border border-white/40 dark:border-white/5 rounded-[36px] p-8 mb-10 shadow-[0_6px_20px_rgba(0,0,0,0.02)]">
    <div class="flex justify-between items-center mb-6 border-b border-gray-200 dark:border-gray-800 pb-4">
        <h3 class="font-black text-xl tracking-tight text-gray-800 dark:text-white"><i class="fas fa-calendar-check text-blue-500 mr-2"></i>Jadual Kerja & Temujanji</h3>
        <button onclick="addJob()" class="bg-white/40 dark:bg-white/5 border border-white/60 dark:border-white/10 hover:bg-white/60 px-5 py-2 rounded-full text-xs font-black shadow-sm transition"><i class="fas fa-plus mr-1"></i> Tambah</button>
    </div>
    <div id="calendar-widget" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4"></div>
</div>
