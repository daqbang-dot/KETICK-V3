<div class="fixed inset-0 z-[-1] overflow-hidden bg-gray-50 dark:bg-gray-900 pointer-events-none transition-colors duration-500">
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-[120px] opacity-60"></div>
    <div class="absolute top-[20%] right-[-10%] w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-[120px] opacity-60"></div>
    <div class="absolute bottom-[-10%] left-[20%] w-96 h-96 bg-pink-400 rounded-full mix-blend-multiply filter blur-[120px] opacity-60"></div>
</div>

<div class="flex justify-between items-end mb-6 flex-wrap gap-3">
    <div>
        <h2 class="text-3xl md:text-4xl font-black tracking-tight text-gray-800 dark:text-white drop-shadow-sm">Ringkasan Niaga</h2>
        <p class="text-gray-600 dark:text-gray-300 font-medium">Prestasi semasa anda hari ini.</p>
    </div>
    <div class="text-right flex flex-col items-end gap-2">
        <div class="flex bg-white/30 dark:bg-black/30 backdrop-blur-xl p-1 rounded-2xl gap-1 border border-white/60 dark:border-white/10 shadow-sm no-print">
            <button onclick="toggleDarkMode()" id="btn-theme" class="px-4 py-2 rounded-xl text-gray-700 dark:text-gray-200 hover:bg-white/50 dark:hover:bg-gray-700/50 transition text-sm font-bold shadow-sm">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        <p id="current-date-display" class="font-bold text-gray-700 dark:text-gray-300 tracking-widest text-xs drop-shadow-sm"></p>
    </div>
</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <button onclick="loadModule('pos')" class="bg-white/40 dark:bg-black/40 backdrop-blur-2xl border border-white/60 dark:border-white/10 p-5 rounded-[32px] flex flex-col items-center justify-center gap-3 shadow-[0_8px_32px_rgba(0,0,0,0.05)] hover:bg-white/60 transition-all group">
        <div class="w-14 h-14 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-white shadow-lg group-hover:scale-110 transition-transform"><i class="fas fa-cash-register text-2xl"></i></div>
        <span class="text-sm font-bold text-gray-800 dark:text-gray-200 tracking-tight">Mini POS</span>
    </button>
    <button onclick="loadModule('billing')" class="bg-white/40 dark:bg-black/40 backdrop-blur-2xl border border-white/60 dark:border-white/10 p-5 rounded-[32px] flex flex-col items-center justify-center gap-3 shadow-[0_8px_32px_rgba(0,0,0,0.05)] hover:bg-white/60 transition-all group">
        <div class="w-14 h-14 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg group-hover:scale-110 transition-transform"><i class="fas fa-file-invoice text-2xl"></i></div>
        <span class="text-sm font-bold text-gray-800 dark:text-gray-200 tracking-tight">Invois Baru</span>
    </button>
    <button onclick="loadModule('inventory')" class="bg-white/40 dark:bg-black/40 backdrop-blur-2xl border border-white/60 dark:border-white/10 p-5 rounded-[32px] flex flex-col items-center justify-center gap-3 shadow-[0_8px_32px_rgba(0,0,0,0.05)] hover:bg-white/60 transition-all group">
        <div class="w-14 h-14 rounded-full bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center text-white shadow-lg group-hover:scale-110 transition-transform"><i class="fas fa-box-open text-2xl"></i></div>
        <span class="text-sm font-bold text-gray-800 dark:text-gray-200 tracking-tight">Tambah Stok</span>
    </button>
    <button onclick="loadModule('social')" class="bg-white/40 dark:bg-black/40 backdrop-blur-2xl border border-white/60 dark:border-white/10 p-5 rounded-[32px] flex flex-col items-center justify-center gap-3 shadow-[0_8px_32px_rgba(0,0,0,0.05)] hover:bg-white/60 transition-all group">
        <div class="w-14 h-14 rounded-full bg-gradient-to-br from-pink-500 to-rose-500 flex items-center justify-center text-white shadow-lg group-hover:scale-110 transition-transform"><i class="fas fa-share-nodes text-2xl"></i></div>
        <span class="text-sm font-bold text-gray-800 dark:text-gray-200 tracking-tight">Pemasaran</span>
    </button>
</div>

<div id="low-stock-panel" class="mb-8 bg-white/40 dark:bg-red-900/40 backdrop-blur-2xl border border-white/60 dark:border-red-500/30 p-6 rounded-[32px] hidden shadow-lg relative overflow-hidden">
    <div class="absolute inset-0 bg-red-500/10 pointer-events-none"></div>
    <div class="flex items-center gap-3 mb-3 relative z-10"><i class="fas fa-exclamation-triangle text-red-500 text-xl animate-pulse"></i><h3 class="font-black text-red-600 dark:text-red-400">⚠️ Stok Kritikal (≤ ambang)</h3></div>
    <div id="low-stock-list" class="space-y-2 text-sm text-gray-800 dark:text-red-200 font-bold relative z-10"></div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
    <div class="lg:col-span-2 bg-white/40 dark:bg-black/40 backdrop-blur-3xl border border-white/60 dark:border-white/10 rounded-[40px] p-8 flex flex-col justify-between shadow-[0_8px_32px_rgba(0,0,0,0.05)] relative overflow-hidden">
        <div class="flex justify-between items-start flex-wrap gap-3 relative z-10">
            <h3 class="text-sm font-bold text-gray-600 dark:text-gray-300 uppercase tracking-widest">Revenue Terkini (Receipt)</h3>
            <div class="flex gap-2">
                <button onclick="loadModule('lhdn')" class="bg-white/60 dark:bg-white/10 hover:bg-white border border-white/80 dark:border-white/20 text-gray-800 dark:text-white px-4 py-2 rounded-full text-xs font-bold tracking-tighter backdrop-blur-md transition shadow-sm"><span>REKOD CUKAI</span> <i class="fas fa-plus"></i></button>
            </div>
        </div>
        <div class="my-6 relative z-10">
            <h1 id="dash-total-rev" class="text-5xl md:text-6xl font-black tracking-tighter drop-shadow-md text-gray-900 dark:text-white">RM 0.00</h1>
            <p class="text-gray-600 dark:text-gray-400 font-medium mt-2">Berdasarkan jualan yang telah dibayar</p>
        </div>
        <div class="grid grid-cols-3 gap-4 border-t border-gray-300/50 dark:border-gray-700/50 pt-6 relative z-10">
            <div><p class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase">Margin Untung</p><p id="dash-total-margin" class="text-xl font-black text-emerald-600 dark:text-emerald-400">RM 0.00</p></div>
            <div><p class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase">Belanja (Cukai)</p><p id="dash-tax-expense" class="text-xl font-black text-orange-600 dark:text-orange-400">RM 0.00</p></div>
            <div><p class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase">Total Stok</p><p id="dash-inv-count" class="text-xl font-black text-gray-800 dark:text-white">0 Unit</p></div>
        </div>
    </div>
    
    <div class="bg-white/40 dark:bg-black/40 backdrop-blur-3xl border border-white/60 dark:border-white/10 rounded-[40px] p-6 shadow-[0_8px_32px_rgba(0,0,0,0.05)]">
        <h3 class="font-black text-gray-800 dark:text-white text-lg mb-4"><i class="fas fa-building mr-2 text-indigo-500"></i>Profil Bisnes</h3>
        <div class="space-y-3">
            <div class="flex gap-2">
                <label class="flex-1 bg-white/50 dark:bg-white/10 backdrop-blur-md border border-white/60 dark:border-white/20 p-3 rounded-2xl text-center cursor-pointer hover:bg-white/80 transition shadow-sm"><span class="text-[10px] font-bold text-gray-700 dark:text-gray-300">LOGO</span><input type="file" onchange="uploadProfileImg(this, 'logo')" class="hidden"></label>
                <label class="flex-1 bg-white/50 dark:bg-white/10 backdrop-blur-md border border-white/60 dark:border-white/20 p-3 rounded-2xl text-center cursor-pointer hover:bg-white/80 transition shadow-sm"><span class="text-[10px] font-bold text-gray-700 dark:text-gray-300">COP</span><input type="file" onchange="uploadProfileImg(this, 'cop')" class="hidden"></label>
                <label class="flex-1 bg-blue-500/80 text-white backdrop-blur-md border border-blue-400/50 p-3 rounded-2xl text-center cursor-pointer hover:bg-blue-600/80 transition shadow-sm"><span class="text-[10px] font-bold">WALLPAPER</span><input type="file" onchange="uploadBgImg(this)" accept="image/*" class="hidden"></label>
            </div>
            <button onclick="removeBgImg()" id="btn-remove-bg" class="w-full text-[10px] font-bold bg-red-500/80 text-white backdrop-blur-md py-2 rounded-xl hidden mb-2 hover:bg-red-600/80 transition shadow-sm"><i class="fas fa-trash"></i> Buang Wallpaper</button>
            <input type="text" id="set-biz-name" oninput="updateBizProfile()" class="w-full p-3 bg-white/50 dark:bg-black/50 border border-white/60 dark:border-white/10 backdrop-blur-md rounded-xl text-sm font-bold text-gray-800 dark:text-white focus:border-blue-400 outline-none shadow-inner" placeholder="Nama Syarikat">
            <textarea id="set-biz-addr" oninput="updateBizProfile()" class="w-full p-3 bg-white/50 dark:bg-black/50 border border-white/60 dark:border-white/10 backdrop-blur-md rounded-xl text-xs h-16 text-gray-800 dark:text-white focus:border-blue-400 outline-none custom-scroll shadow-inner" placeholder="Alamat & No. SSM"></textarea>
            <input type="text" id="set-biz-bank" oninput="updateBizProfile()" class="w-full p-3 bg-white/50 dark:bg-black/50 border border-white/60 dark:border-white/10 backdrop-blur-md rounded-xl text-xs font-bold text-gray-800 dark:text-white focus:border-blue-400 outline-none shadow-inner" placeholder="Bank & No Akaun">
        </div>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
    <div class="lg:col-span-2 bg-white/40 dark:bg-black/40 backdrop-blur-3xl border border-white/60 dark:border-white/10 rounded-[40px] p-6 shadow-[0_8px_32px_rgba(0,0,0,0.05)]">
        <h3 class="font-black text-gray-800 dark:text-white text-lg mb-4"><i class="fas fa-chart-line mr-2 text-blue-500"></i>Tren Jualan</h3>
        <div class="w-full h-48">
            <canvas id="dashboardChart"></canvas>
        </div>
    </div>
    <div class="bg-white/40 dark:bg-black/40 backdrop-blur-3xl border border-white/60 dark:border-white/10 rounded-[40px] p-6 shadow-[0_8px_32px_rgba(0,0,0,0.05)] flex flex-col">
        <h3 class="font-black text-gray-800 dark:text-white text-lg mb-4"><i class="fas fa-bolt mr-2 text-amber-500"></i>Aktiviti Terkini</h3>
        <div id="recent-activity-list" class="space-y-3 flex-1 overflow-y-auto custom-scroll pr-2">
            </div>
        <button onclick="loadModule('history')" class="mt-4 w-full bg-white/50 dark:bg-white/10 border border-white/60 dark:border-white/20 p-3 rounded-2xl text-[10px] font-bold text-gray-700 dark:text-gray-300 uppercase hover:bg-white/80 transition shadow-sm">Lihat Semua Sejarah <i class="fas fa-arrow-right"></i></button>
    </div>
</div>

<div class="bg-white/40 dark:bg-black/40 backdrop-blur-3xl border border-white/60 dark:border-white/10 rounded-[40px] p-8 mb-10 shadow-[0_8px_32px_rgba(0,0,0,0.05)]">
    <div class="flex justify-between items-center mb-6 border-b border-gray-300/50 dark:border-gray-700/50 pb-4">
        <h3 class="font-black text-xl tracking-tight text-gray-800 dark:text-white"><i class="fas fa-calendar-check text-blue-500 mr-2"></i>Jadual Kerja & Temujanji</h3>
        <button onclick="addJob()" class="bg-white/60 dark:bg-white/10 border border-white/80 dark:border-white/20 text-gray-800 dark:text-white hover:bg-white px-5 py-2 rounded-full text-xs font-black shadow-sm transition"><i class="fas fa-plus mr-1"></i> Tambah</button>
    </div>
    <div id="calendar-widget" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4"></div>
</div>
