<div class="flex justify-between items-end mb-6 flex-wrap gap-3">
    <div>
        <h2 class="text-3xl md:text-4xl font-black tracking-tight">Ringkasan Niaga</h2>
        <p class="text-gray-500 font-medium">Prestasi semasa anda hari ini.</p>
    </div>
    <div class="text-right flex flex-col items-end gap-2">
        <div class="flex bg-gray-100 p-1 rounded-xl gap-1 no-print">
            <button onclick="toggleDarkMode()" id="btn-theme" class="px-4 py-2 rounded-lg text-gray-500 hover:text-gray-800 transition text-sm font-bold shadow-sm">
                <i class="fas fa-moon"></i>
            </button>
            </div>
        <p id="current-date-display" class="font-bold text-blue-600 uppercase tracking-widest text-xs"></p>
    </div>
</div>

<div id="low-stock-panel" class="mb-8 flux-card p-6 bg-red-50 border-red-200 hidden">
    <div class="flex items-center gap-3 mb-3"><i class="fas fa-exclamation-triangle text-red-500 text-xl"></i><h3 class="font-black text-red-600">⚠️ Stok Kritikal (≤ ambang)</h3></div>
    <div id="low-stock-list" class="space-y-2 text-sm"></div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
    <div class="lg:col-span-2 flux-card p-8 flex flex-col justify-between">
        <div class="flex justify-between items-start flex-wrap gap-3">
            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Revenue Terkini (Receipt)</h3>
            <div class="flex gap-2">
                <button onclick="loadModule('lhdn')" class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-bold tracking-tighter"><span>REKOD CUKAI</span> <i class="fas fa-plus"></i></button>
                <span class="bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full text-xs font-bold">+12%</span>
            </div>
        </div>
        <div class="my-6">
            <h1 id="dash-total-rev" class="text-5xl md:text-6xl font-black tracking-tighter text-blue-600">RM 0.00</h1>
            <p class="text-gray-400 font-medium mt-2">Berdasarkan jualan yang telah dibayar (Receipt)</p>
        </div>
        <div class="grid grid-cols-3 gap-4 border-t border-gray-100 pt-6">
            <div><p class="text-[10px] font-bold text-gray-400 uppercase">Margin Keuntungan</p><p id="dash-total-margin" class="text-xl font-bold text-emerald-500">RM 0.00</p></div>
            <div><p class="text-[10px] font-bold text-gray-400 uppercase">Belanja (Cukai)</p><p id="dash-tax-expense" class="text-xl font-bold text-orange-500">RM 0.00</p></div>
            <div><p class="text-[10px] font-bold text-gray-400 uppercase">Jumlah Item Stok</p><p id="dash-inv-count" class="text-xl font-bold text-gray-800">0 Unit</p></div>
        </div>
    </div>
    <div class="flux-card p-6">
        <h3 class="font-bold text-gray-800 text-sm mb-4"><i class="fas fa-cog mr-2"></i><span>Business Info</span></h3>
        <div class="space-y-3">
            <div class="flex gap-2">
                <label class="flex-1 bg-gray-100 p-3 rounded-2xl text-center cursor-pointer hover:bg-gray-200 transition"><span class="text-[10px] font-bold text-gray-500">LOGO</span><input type="file" onchange="uploadProfileImg(this, 'logo')" class="hidden"></label>
                <label class="flex-1 bg-gray-100 p-3 rounded-2xl text-center cursor-pointer hover:bg-gray-200 transition"><span class="text-[10px] font-bold text-gray-500">COP</span><input type="file" onchange="uploadProfileImg(this, 'cop')" class="hidden"></label>
                <label class="flex-1 bg-blue-100 p-3 rounded-2xl text-center cursor-pointer hover:bg-blue-200 transition"><span class="text-[10px] font-bold text-blue-600">WALLPAPER</span><input type="file" onchange="uploadBgImg(this)" accept="image/*" class="hidden"></label>
            </div>
            
            <button onclick="removeBgImg()" id="btn-remove-bg" class="w-full text-[10px] font-bold text-red-400 hidden mb-2 hover:text-red-600"><i class="fas fa-trash"></i> Buang Wallpaper</button>

            <input type="text" id="set-biz-name" oninput="updateBizProfile()" class="w-full p-3 flux-input text-sm font-bold" placeholder="Nama Syarikat">
            <textarea id="set-biz-addr" oninput="updateBizProfile()" class="w-full p-3 flux-input text-xs h-20" placeholder="Alamat & No. SSM"></textarea>
            <input type="text" id="set-biz-bank" oninput="updateBizProfile()" class="w-full p-3 flux-input text-xs" placeholder="Bank & No Akaun">
        </div>
    </div>
</div>

<div class="flux-card p-8">
    <div class="flex justify-between items-center mb-6">
        <h3 class="font-black text-xl tracking-tight">Jadual Kerja & Temujanji</h3>
        <button onclick="addJob()" class="bg-blue-600 text-white px-6 py-2 rounded-full text-xs font-bold shadow-lg shadow-blue-200">+ Tambah Nota</button>
    </div>
    <div id="calendar-widget" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
</div>
