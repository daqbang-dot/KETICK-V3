<div class="flex justify-between items-end mb-6 flex-wrap gap-3">
    <div>
        <h2 class="text-3xl md:text-4xl font-black tracking-tight text-gray-800 dark:text-white">Ringkasan Niaga</h2>
        <p class="text-gray-500 dark:text-gray-400 font-medium">Prestasi semasa anda hari ini.</p>
    </div>
    <div class="text-right flex flex-col items-end gap-2">
        <div class="flex bg-white dark:bg-gray-800 p-1 rounded-xl gap-1 border border-gray-200 dark:border-gray-700 shadow-sm no-print">
            <button onclick="toggleDarkMode()" id="btn-theme" class="px-4 py-2 rounded-lg text-gray-600 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition text-sm font-bold">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        <p id="current-date-display" class="font-bold text-blue-600 dark:text-blue-400 uppercase tracking-widest text-xs"></p>
    </div>
</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <button onclick="loadModule('pos')" class="bg-emerald-500 hover:bg-emerald-600 text-white p-5 rounded-[24px] flex flex-col items-center justify-center gap-3 transition shadow-lg shadow-emerald-200 dark:shadow-none border-b-4 border-emerald-700 active:translate-y-1 active:border-b-0">
        <i class="fas fa-cash-register text-3xl"></i>
        <span class="text-sm font-bold">Mini POS</span>
    </button>
    <button onclick="loadModule('billing')" class="bg-blue-600 hover:bg-blue-700 text-white p-5 rounded-[24px] flex flex-col items-center justify-center gap-3 transition shadow-lg shadow-blue-200 dark:shadow-none border-b-4 border-blue-800 active:translate-y-1 active:border-b-0">
        <i class="fas fa-file-invoice text-3xl"></i>
        <span class="text-sm font-bold">Invois Baru</span>
    </button>
    <button onclick="loadModule('inventory')" class="bg-amber-500 hover:bg-amber-600 text-white p-5 rounded-[24px] flex flex-col items-center justify-center gap-3 transition shadow-lg shadow-amber-200 dark:shadow-none border-b-4 border-amber-700 active:translate-y-1 active:border-b-0">
        <i class="fas fa-box-open text-3xl"></i>
        <span class="text-sm font-bold">Tambah Stok</span>
    </button>
    <button onclick="loadModule('social')" class="bg-pink-500 hover:bg-pink-600 text-white p-5 rounded-[24px] flex flex-col items-center justify-center gap-3 transition shadow-lg shadow-pink-200 dark:shadow-none border-b-4 border-pink-700 active:translate-y-1 active:border-b-0">
        <i class="fas fa-share-nodes text-3xl"></i>
        <span class="text-sm font-bold">Pemasaran</span>
    </button>
</div>

<div id="low-stock-panel" class="mb-8 bg-red-100 border-l-8 border-red-500 p-6 rounded-2xl hidden shadow-sm">
    <div class="flex items-center gap-3 mb-3"><i class="fas fa-exclamation-triangle text-red-600 text-xl"></i><h3 class="font-black text-red-700">⚠️ Stok Kritikal (≤ ambang)</h3></div>
    <div id="low-stock-list" class="space-y-2 text-sm text-red-800 font-medium"></div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
    <div class="lg:col-span-2 bg-gradient-to-br from-blue-700 to-indigo-900 rounded-[32px] p-8 flex flex-col justify-between shadow-xl text-white relative overflow-hidden">
        <i class="fas fa-chart-pie absolute -bottom-10 -right-4 text-[200px] text-white opacity-5 pointer-events-none"></i>
        
        <div class="flex justify-between items-start flex-wrap gap-3 relative z-10">
            <h3 class="text-sm font-bold text-blue-200 uppercase tracking-widest">Revenue Terkini (Receipt)</h3>
            <div class="flex gap-2">
                <button onclick="loadModule('lhdn')" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-full text-xs font-bold tracking-tighter backdrop-blur-sm transition border border-white/20"><span>REKOD CUKAI</span> <i class="fas fa-plus"></i></button>
            </div>
        </div>
        <div class="my-6 relative z-10">
            <h1 id="dash-total-rev" class="text-5xl md:text-6xl font-black tracking-tighter drop-shadow-md text-white">RM 0.00</h1>
            <p class="text-blue-200 font-medium mt-2">Berdasarkan jualan yang telah dibayar</p>
        </div>
        <div class="grid grid-cols-3 gap-4 border-t border-blue-500/50 pt-6 relative z-10">
            <div><p class="text-[10px] font-bold text-blue-300 uppercase">Margin Untung</p><p id="dash-total-margin" class="text-xl font-bold text-emerald-300">RM 0.00</p></div>
            <div><p class="text-[10px] font-bold text-blue-300 uppercase">Belanja (Cukai)</p><p id="dash-tax-expense" class="text-xl font-bold text-orange-300">RM 0.00</p></div>
            <div><p class="text-[10px] font-bold text-blue-300 uppercase">Total Stok</p><p id="dash-inv-count" class="text-xl font-bold text-white">0 Unit</p></div>
        </div>
    </div>
    
    <div class="bg-white dark:bg-gray-800 rounded-[32px] p-6 shadow-lg border border-gray-100 dark:border-gray-700">
        <h3 class="font-black text-gray-800 dark:text-white text-lg mb-4"><i class="fas fa-building mr-2 text-blue-600"></i>Profil Bisnes</h3>
        <div class="space-y-3">
            <div class="flex gap-2">
                <label class="flex-1 bg-gray-100 dark:bg-gray-700 p-3 rounded-xl text-center cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-600 transition"><span class="text-[10px] font-bold text-gray-600 dark:text-gray-300">LOGO</span><input type="file" onchange="uploadProfileImg(this, 'logo')" class="hidden"></label>
                <label class="flex-1 bg-gray-100 dark:bg-gray-700 p-3 rounded-xl text-center cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-600 transition"><span class="text-[10px] font-bold text-gray-600 dark:text-gray-300">COP</span><input type="file" onchange="uploadProfileImg(this, 'cop')" class="hidden"></label>
                <label class="flex-1 bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-300 p-3 rounded-xl text-center cursor-pointer hover:bg-blue-200 transition"><span class="text-[10px] font-bold">WALLPAPER</span><input type="file" onchange="uploadBgImg(this)" accept="image/*" class="hidden"></label>
            </div>
            <button onclick="removeBgImg()" id="btn-remove-bg" class="w-full text-[10px] font-bold bg-red-50 text-red-500 py-2 rounded-xl hidden mb-2 hover:bg-red-100 transition"><i class="fas fa-trash"></i> Buang Wallpaper</button>
            <input type="text" id="set-biz-name" oninput="updateBizProfile()" class="w-full p-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-bold text-gray-800 dark:text-white focus:border-blue-500 outline-none" placeholder="Nama Syarikat">
            <textarea id="set-biz-addr" oninput="updateBizProfile()" class="w-full p-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-xs h-16 text-gray-800 dark:text-white focus:border-blue-500 outline-none custom-scroll" placeholder="Alamat & No. SSM"></textarea>
            <input type="text" id="set-biz-bank" oninput="updateBizProfile()" class="w-full p-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-xs text-gray-800 dark:text-white focus:border-blue-500 outline-none" placeholder="Bank & No Akaun">
        </div>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
    <div class="lg:col-span-2 bg-white dark:bg-gray-800 rounded-[32px] p-6 shadow-lg border border-gray-100 dark:border-gray-700">
        <h3 class="font-black text-gray-800 dark:text-white text-lg mb-4"><i class="fas fa-chart-line mr-2 text-emerald-500"></i>Tren Jualan</h3>
        <div class="w-full h-48">
            <canvas id="dashboardChart"></canvas>
        </div>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-[32px] p-6 shadow-lg border border-gray-100 dark:border-gray-700 flex flex-col">
        <h3 class="font-black text-gray-800 dark:text-white text-lg mb-4"><i class="fas fa-bolt mr-2 text-amber-500"></i>Aktiviti Terkini</h3>
        <div id="recent-activity-list" class="space-y-3 flex-1 overflow-y-auto custom-scroll pr-2">
            </div>
        <button onclick="loadModule('history')" class="mt-4 w-full bg-gray-50 dark:bg-gray-700 p-3 rounded-xl text-[10px] font-bold text-gray-600 dark:text-gray-300 uppercase hover:bg-gray-100 transition">Lihat Semua Sejarah <i class="fas fa-arrow-right"></i></button>
    </div>
</div>

<div class="bg-white dark:bg-gray-800 rounded-[32px] p-8 mb-10 shadow-lg border border-gray-100 dark:border-gray-700">
    <div class="flex justify-between items-center mb-6 border-b border-gray-100 dark:border-gray-700 pb-4">
        <h3 class="font-black text-xl tracking-tight text-gray-800 dark:text-white"><i class="fas fa-calendar-check text-blue-600 mr-2"></i>Jadual Kerja & Temujanji</h3>
        <button onclick="addJob()" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-5 py-2 rounded-full text-xs font-black transition"><i class="fas fa-plus mr-1"></i> Tambah</button>
    </div>
    <div id="calendar-widget" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4"></div>
</div>
