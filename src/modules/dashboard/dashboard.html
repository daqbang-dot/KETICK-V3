<div class="flex justify-between items-end mb-8 flex-wrap gap-3">
    <div>
        <h2 class="text-4xl font-black tracking-tight text-black dark:text-white uppercase italic">Ringkasan Niaga</h2>
        <p class="text-black dark:text-gray-400 font-bold border-l-4 border-black dark:border-white pl-3">Dashboard v6 // Neo-Edition</p>
    </div>
    <div class="text-right flex flex-col items-end gap-2">
        <button onclick="toggleDarkMode()" id="btn-theme" class="bg-yellow-400 border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] px-4 py-2 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all active:scale-95">
            <i class="fas fa-moon text-black"></i>
        </button>
        <p id="current-date-display" class="font-black text-black dark:text-yellow-400 uppercase tracking-tighter text-sm"></p>
    </div>
</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
    <button onclick="loadModule('pos')" class="bg-cyan-400 border-4 border-black p-5 flex flex-col items-center justify-center gap-3 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[4px] hover:translate-y-[4px] hover:shadow-none transition-all group">
        <i class="fas fa-cash-register text-4xl text-black group-hover:rotate-12 transition-transform"></i>
        <span class="text-sm font-black text-black uppercase tracking-tighter">Mini POS</span>
    </button>
    <button onclick="loadModule('billing')" class="bg-pink-400 border-4 border-black p-5 flex flex-col items-center justify-center gap-3 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[4px] hover:translate-y-[4px] hover:shadow-none transition-all group">
        <i class="fas fa-file-invoice text-4xl text-black group-hover:rotate-12 transition-transform"></i>
        <span class="text-sm font-black text-black uppercase tracking-tighter">Invois Baru</span>
    </button>
    <button onclick="loadModule('inventory')" class="bg-lime-400 border-4 border-black p-5 flex flex-col items-center justify-center gap-3 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[4px] hover:translate-y-[4px] hover:shadow-none transition-all group">
        <i class="fas fa-box-open text-4xl text-black group-hover:rotate-12 transition-transform"></i>
        <span class="text-sm font-black text-black uppercase tracking-tighter">Tambah Stok</span>
    </button>
    <button onclick="loadModule('social')" class="bg-orange-400 border-4 border-black p-5 flex flex-col items-center justify-center gap-3 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[4px] hover:translate-y-[4px] hover:shadow-none transition-all group">
        <i class="fas fa-share-nodes text-4xl text-black group-hover:rotate-12 transition-transform"></i>
        <span class="text-sm font-black text-black uppercase tracking-tighter">Pemasaran</span>
    </button>
</div>

<div id="low-stock-panel" class="mb-8 bg-red-500 border-4 border-black p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hidden">
    <div class="flex items-center gap-3 mb-3"><i class="fas fa-exclamation-triangle text-white text-2xl"></i><h3 class="font-black text-white uppercase italic text-xl underline">Amaran: Stok Kritikal</h3></div>
    <div id="low-stock-list" class="space-y-2 text-sm text-white font-bold"></div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
    <div class="lg:col-span-2 bg-white dark:bg-gray-900 border-4 border-black dark:border-white p-8 flex flex-col justify-between shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] dark:shadow-[12px_12px_0px_0px_rgba(255,255,255,0.2)]">
        <div class="flex justify-between items-start flex-wrap gap-3">
            <h3 class="text-lg font-black text-black dark:text-white uppercase underline decoration-blue-500 decoration-4">Revenue Terkini (Receipt)</h3>
            <button onclick="loadModule('lhdn')" class="bg-black text-white dark:bg-white dark:text-black px-6 py-2 font-black text-xs uppercase hover:invert transition-all">REKOD CUKAI +</button>
        </div>
        <div class="my-8">
            <h1 id="dash-total-rev" class="text-6xl md:text-8xl font-black tracking-tighter text-black dark:text-white">RM 0.00</h1>
            <p class="text-gray-500 font-black uppercase mt-2 tracking-widest text-xs">// TRANSACTION_FINALIZED</p>
        </div>
        <div class="grid grid-cols-3 gap-4 border-t-4 border-black dark:border-white pt-6">
            <div><p class="text-xs font-black text-gray-500 uppercase">Margin</p><p id="dash-total-margin" class="text-2xl font-black text-blue-600">RM 0.00</p></div>
            <div><p class="text-xs font-black text-gray-500 uppercase">Belanja</p><p id="dash-tax-expense" class="text-2xl font-black text-red-500">RM 0.00</p></div>
            <div><p class="text-xs font-black text-gray-500 uppercase">Stok</p><p id="dash-inv-count" class="text-2xl font-black text-black dark:text-white">0 Unit</p></div>
        </div>
    </div>
    
    <div class="bg-yellow-300 border-4 border-black p-6 shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]">
        <h3 class="font-black text-black text-xl mb-6 uppercase border-b-4 border-black pb-2">Profil Bisnes</h3>
        <div class="space-y-4">
            <div class="flex gap-2">
                <label class="flex-1 bg-white border-2 border-black p-3 text-center cursor-pointer font-black text-[10px] hover:bg-black hover:text-white transition">LOGO<input type="file" onchange="uploadProfileImg(this, 'logo')" class="hidden"></label>
                <label class="flex-1 bg-white border-2 border-black p-3 text-center cursor-pointer font-black text-[10px] hover:bg-black hover:text-white transition">COP<input type="file" onchange="uploadProfileImg(this, 'cop')" class="hidden"></label>
                <label class="flex-1 bg-black text-white border-2 border-black p-3 text-center cursor-pointer font-black text-[10px] hover:bg-white hover:text-black transition">BG<input type="file" onchange="uploadBgImg(this)" accept="image/*" class="hidden"></label>
            </div>
            <button onclick="removeBgImg()" id="btn-remove-bg" class="w-full text-xs font-black bg-red-500 text-white border-2 border-black py-2 hidden hover:bg-red-600 transition">BUANG WALLPAPER</button>
            <input type="text" id="set-biz-name" oninput="updateBizProfile()" class="w-full p-3 bg-white border-2 border-black font-black text-sm outline-none focus:bg-black focus:text-white transition" placeholder="NAMA SYARIKAT">
            <textarea id="set-biz-addr" oninput="updateBizProfile()" class="w-full p-3 bg-white border-2 border-black font-black text-xs h-20 outline-none focus:bg-black focus:text-white transition" placeholder="ALAMAT & SSM"></textarea>
            <input type="text" id="set-biz-bank" oninput="updateBizProfile()" class="w-full p-3 bg-white border-2 border-black font-black text-xs outline-none focus:bg-black focus:text-white transition" placeholder="BANK & AKAUN">
        </div>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
    <div class="lg:col-span-2 bg-white dark:bg-gray-800 border-4 border-black p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
        <h3 class="font-black text-black dark:text-white text-xl mb-4 uppercase italic">Data Visualisasi_</h3>
        <div class="w-full h-56 bg-gray-50 dark:bg-gray-900 border-2 border-black p-4">
            <canvas id="dashboardChart"></canvas>
        </div>
    </div>
    <div class="bg-white dark:bg-gray-800 border-4 border-black p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] flex flex-col">
        <h3 class="font-black text-black dark:text-white text-xl mb-4 uppercase italic">Live Log_</h3>
        <div id="recent-activity-list" class="space-y-3 flex-1 overflow-y-auto custom-scroll pr-2">
            </div>
        <button onclick="loadModule('history')" class="mt-4 w-full bg-black text-white dark:bg-white dark:text-black p-3 font-black uppercase text-xs hover:tracking-widest transition-all">Lihat Semua Log -></button>
    </div>
</div>

<div class="bg-purple-400 border-4 border-black p-8 mb-16 shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]">
    <div class="flex justify-between items-center mb-8 border-b-4 border-black pb-4">
        <h3 class="font-black text-2xl tracking-tighter text-black uppercase italic">Penjadual Kerja (Beta)</h3>
        <button onclick="addJob()" class="bg-white border-2 border-black text-black px-6 py-2 font-black text-sm uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-[2px] hover:translate-y-[2px] transition-all">+ Nota Baru</button>
    </div>
    <div id="calendar-widget" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>
</div>
