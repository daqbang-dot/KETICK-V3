<h2 class="text-3xl font-black mb-6" data-i18n="hist-title">Rekod Transaksi</h2>
<div class="mb-4 flex gap-2">
    <input type="text" id="history-search" placeholder="Cari (nama, no rujukan, telefon)" class="flex-1 p-3 flux-input text-sm">
    <button onclick="renderHistory()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold"><i class="fas fa-search mr-1"></i> <span data-i18n="btn-search">Cari</span></button>
</div>
<div class="flux-card overflow-x-auto">
    <table class="w-full text-left min-w-[800px] text-sm">
        <thead class="bg-black text-white font-bold text-[10px] uppercase tracking-widest">
            <tr>
                <th class="p-6" data-i18n="th-date">Tarikh</th>
                <th class="p-6" data-i18n="th-ref">No. Rujukan</th>
                <th class="p-6" data-i18n="th-client">Pelanggan</th>
                <th class="p-6" data-i18n="th-phone">Telefon</th>
                <th class="p-6" data-i18n="th-type">Jenis</th>
                <th class="p-6 text-right" data-i18n="th-amount">Jumlah (RM)</th>
                <th class="p-6 text-center" data-i18n="th-action">Tindakan</th>
            </tr>
        </thead>
        <tbody id="history-body" class="divide-y divide-gray-100"></tbody>
    </table>
</div>
