<div class="flex justify-between items-center mb-6">
    <h2 class="text-3xl font-black" data-i18n="menu-promo">Coupon Manager</h2>
</div>
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div class="flux-card p-8">
        <h3 class="font-black text-lg mb-6" data-i18n="promo-add">Tambah Kupon Baru</h3>
        <input type="text" id="new-coupon-code" class="w-full p-3 flux-input mb-3" placeholder="Kod">
        <input type="number" id="new-coupon-val" class="w-full p-3 flux-input mb-3" placeholder="Nilai (RM)">
        <button onclick="addNewCoupon()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-bold" data-i18n="btn-save">SIMPAN</button>
    </div>
    <div class="lg:col-span-2 flux-card p-8">
        <h3 class="font-black text-lg mb-6" data-i18n="promo-list">Senarai Kupon</h3>
        <div id="coupon-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
</div>
