<div class="min-h-screen bg-[#0B101E] text-white font-['Inter'] -m-4 p-4 md:-m-8 md:p-8 rounded-xl flex flex-col gap-6">

    <div class="flex justify-between items-center border-b border-white/5 pb-4">
        <h2 class="text-2xl md:text-3xl font-bold tracking-tight text-white flex items-center gap-3">
            <i class="fas fa-file-invoice-dollar text-[#B981FF] drop-shadow-[0_0_8px_rgba(185,129,255,0.6)]"></i> 
            Pengebilan Pintar
        </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-center bg-[#151C2C] border border-white/5 p-4 rounded-2xl shadow-lg relative z-10">
        <div class="relative md:col-span-8">
            <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="text" id="history-search" placeholder="Cari nama pelanggan, no. rujukan atau telefon..." class="w-full pl-12 pr-4 py-3 bg-[#0B101E] border border-white/10 rounded-xl text-sm text-white focus:outline-none focus:border-[#00F0FF] transition-colors">
        </div>
        <div class="md:col-span-4 flex md:justify-end">
            <button onclick="toggleBillingForm()" class="w-full md:w-auto bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-xl font-bold text-sm shadow-[0_0_15px_rgba(249,115,22,0.3)] transition-all uppercase tracking-widest flex items-center justify-center gap-2">
                <i class="fas fa-plus-circle"></i> Rekod Baru
            </button>
        </div>
    </div>

    <div class="flex gap-1 overflow-x-auto custom-scroll pb-2 border-b border-white/5">
        <button class="px-5 py-2.5 text-xs font-semibold whitespace-nowrap bg-[#151C2C] text-gray-400 hover:text-white rounded-lg border border-white/5 hover:border-white/10 transition-colors">Semua</button>
        <button class="px-5 py-2.5 text-xs font-bold whitespace-nowrap bg-[#00F0FF]/10 text-[#00F0FF] rounded-lg border border-[#00F0FF]/30 shadow-[0_0_10px_rgba(0,240,255,0.2)]">Invois (INV)</button>
        <button class="px-5 py-2.5 text-xs font-semibold whitespace-nowrap bg-[#151C2C] text-gray-400 hover:text-white rounded-lg border border-white/5 hover:border-white/10 transition-colors">Sebut Harga (QUO)</button>
        <button class="px-5 py-2.5 text-xs font-semibold whitespace-nowrap bg-[#151C2C] text-gray-400 hover:text-white rounded-lg border border-white/5 hover:border-white/10 transition-colors">Resit (REC)</button>
        <button class="px-5 py-2.5 text-xs font-semibold whitespace-nowrap bg-[#151C2C] text-gray-400 hover:text-white rounded-lg border border-white/5 hover:border-white/10 transition-colors">Draf</button>
        <button class="px-5 py-2.5 text-xs font-semibold whitespace-nowrap bg-[#151C2C] text-gray-400 hover:text-white rounded-lg border border-white/5 hover:border-white/10 transition-colors">Proforma</button>
    </div>

    <div id="history-body" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-10">
        </div>

    <div id="billing-form-container" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm p-4 md:p-10 overflow-y-auto hidden">
        <div class="bg-[#151C2C] border border-white/10 rounded-[32px] p-6 md:p-8 max-w-7xl mx-auto shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
                <h3 class="text-xl font-bold text-white uppercase tracking-widest flex items-center gap-2"><i class="fas fa-plus-circle text-orange-500"></i> Buat Rekod Baru</h3>
                <button onclick="toggleBillingForm()" class="text-gray-500 hover:text-white text-2xl"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-8 space-y-4">
                    <div class="grid grid-cols-2 gap-4 bg-[#0B101E] p-4 rounded-xl border border-white/5">
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold mb-1 block">Jenis</label>
                            <select id="bill-type" class="w-full p-2.5 bg-[#151C2C] border border-white/10 rounded-lg text-xs text-white focus:outline-none focus:border-[#00F0FF]">
                                <option value="INV">Invoice</option>
                                <option value="QUO">Quotation</option>
                                <option value="REC">Receipt</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold mb-1 block">No. Rujukan</label>
                            <input type="text" id="bill-ref" readonly class="w-full p-2.5 bg-[#151C2C] border border-white/10 rounded-lg text-xs text-white font-mono opacity-70">
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <input type="text" id="bill-cust-name" placeholder="Nama Pelanggan / Syarikat" class="w-full p-3 bg-[#0B101E] border border-white/10 rounded-lg text-sm text-white focus:outline-none focus:border-[#00F0FF]">
                        <input type="text" id="bill-cust-phone" placeholder="No. Telefon (Cth: 60123...)" class="w-full p-3 bg-[#0B101E] border border-white/10 rounded-lg text-sm text-white focus:outline-none focus:border-[#00F0FF]">
                        <textarea id="bill-cust-addr" placeholder="Alamat & SSM (Pilihan)" class="w-full p-3 bg-[#0B101E] border border-white/10 rounded-lg text-xs text-white focus:outline-none focus:border-[#00F0FF] h-16 custom-scroll"></textarea>
                    </div>

                    <div class="border-t border-white/5 pt-4 mt-6">
                        <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Item / Perkhidmatan</h4>
                        <div class="grid grid-cols-1 md:grid-cols-12 gap-2 mb-4 bg-[#0B101E] p-3 rounded-xl border border-white/5">
                            <input type="text" id="bill-item-name" placeholder="Deskripsi Item" class="md:col-span-6 p-2 bg-transparent border-b border-white/10 text-sm text-white focus:outline-none focus:border-[#00F0FF]">
                            <input type="number" id="bill-item-qty" placeholder="Qty" class="md:col-span-2 p-2 bg-transparent border-b border-white/10 text-sm text-center text-white focus:outline-none focus:border-[#00F0FF]">
                            <input type="number" id="bill-item-price" placeholder="Harga" class="md:col-span-3 p-2 bg-transparent border-b border-white/10 text-sm text-right text-white focus:outline-none focus:border-[#00F0FF]">
                            <button onclick="addBillItem()" class="md:col-span-1 bg-[#00F0FF]/10 text-[#00F0FF] border border-[#00F0FF]/30 p-2 rounded-lg hover:bg-[#00F0FF]/20 transition-colors font-bold">+</button>
                        </div>
                        
                        <div id="bill-item-list" class="space-y-1 max-h-48 overflow-y-auto custom-scroll pr-2 text-sm text-gray-300">
                        </div>
                    </div>
                </div>

                <div class="bg-[#0B101E] border border-white/5 rounded-2xl p-6 flex flex-col justify-between">
                    <div>
                        <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-4 border-b border-white/5 pb-2">Ringkasan Kos</h4>
                        <div class="space-y-2 mb-4">
                            <div class="flex justify-between text-sm text-gray-400"><span>Subtotal:</span><span id="bill-subtotal" class="text-white font-semibold">RM 0.00</span></div>
                            <div class="flex justify-between items-center gap-4">
                                <span class="text-xs text-gray-500 w-1/3">Diskaun (RM):</span>
                                <input type="number" id="bill-discount" placeholder="0.00" class="flex-1 p-2 bg-[#151C2C] border border-white/10 rounded-lg text-sm text-white text-right focus:border-[#00F0FF]" oninput="calcBill()">
                            </div>
                            <div class="flex justify-between items-center gap-4">
                                <span class="text-xs text-gray-500 w-1/3">Cukai (%):</span>
                                <input type="number" id="bill-tax" placeholder="0" class="flex-1 p-2 bg-[#151C2C] border border-white/10 rounded-lg text-sm text-white text-right focus:border-[#00F0FF]" oninput="calcBill()">
                            </div>
                        </div>
                        
                        <div class="pt-4 border-t border-white/10 flex justify-between items-end mt-4">
                            <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Total</span>
                            <span id="bill-grand" class="text-4xl font-bold text-[#CCFF00] drop-shadow-[0_0_8px_rgba(204,255,0,0.4)]">RM 0.00</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-8">
                        <button onclick="generateDocument('preview')" class="bg-[#151C2C] border border-white/10 text-gray-300 py-3 rounded-xl font-bold hover:bg-white/5 transition-colors text-xs flex items-center justify-center gap-2">
                            <i class="fas fa-eye"></i> Preview
                        </button>
                        <button onclick="generateDocument('save')" class="bg-[#B981FF]/20 border border-[#B981FF]/50 text-[#B981FF] hover:bg-[#B981FF]/30 py-3 rounded-xl font-bold text-xs shadow-[0_0_15px_rgba(185,129,255,0.2)] transition-colors uppercase tracking-widest flex items-center justify-center gap-2">
                            <i class="fas fa-save"></i> Simpan
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleBillingForm() {
        const container = document.getElementById('billing-form-container');
        container.classList.toggle('hidden');
        if (!container.classList.contains('hidden')) {
            updateBillRef(); // Kemaskini no rujukan bila borang dibuka
        }
    }
</script>
