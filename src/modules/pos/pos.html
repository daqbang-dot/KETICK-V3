<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
    <div class="lg:col-span-2 flex flex-col h-[calc(100vh-140px)]">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-3xl font-black text-gray-800 dark:text-white drop-shadow-sm"><i class="fas fa-cash-register mr-3 text-emerald-500"></i>Terminal POS</h2>
        </div>
        
        <div class="flux-card p-4 mb-4 z-10 relative">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="pos-search" placeholder="Cari nama produk, kod, atau imbas barcode..." class="w-full pl-12 pr-4 py-3 bg-gray-100/50 dark:bg-black/50 border border-gray-200 dark:border-gray-700 rounded-2xl text-sm font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500 transition" onkeyup="renderProductGrid()">
            </div>
            
            <div class="flex gap-2 mt-3 overflow-x-auto custom-scroll pb-1">
                <button class="px-4 py-1.5 bg-emerald-500 text-white rounded-full text-xs font-bold whitespace-nowrap shadow-sm">Semua</button>
                <button class="px-4 py-1.5 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-full text-xs font-bold whitespace-nowrap hover:bg-gray-200 transition">Produk Fizikal</button>
                <button class="px-4 py-1.5 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-full text-xs font-bold whitespace-nowrap hover:bg-gray-200 transition">Servis</button>
                <button class="px-4 py-1.5 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-full text-xs font-bold whitespace-nowrap hover:bg-gray-200 transition">Alat Ganti</button>
            </div>
        </div>

        <div id="product-grid" class="product-grid flex-1 overflow-y-auto custom-scroll pb-20 pr-2">
            </div>
    </div>

    <div class="flux-card flex flex-col h-[calc(100vh-140px)] border-t-8 border-t-emerald-500 relative overflow-hidden shadow-2xl">
        <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 10px 10px;"></div>
        
        <div class="p-5 flex-1 flex flex-col z-10">
            <div class="bg-gray-50 dark:bg-gray-800/50 p-3 rounded-2xl mb-4 border border-gray-100 dark:border-gray-700">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-bold text-xs text-gray-500 uppercase tracking-widest"><i class="fas fa-user-circle mr-1"></i> Pelanggan</h3>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="pos-cust-name" placeholder="Nama (Pilihan)" class="p-2 bg-white dark:bg-black/50 border border-gray-200 dark:border-gray-600 rounded-xl text-xs font-bold">
                    <input type="text" id="pos-cust-phone" placeholder="No Telefon" class="p-2 bg-white dark:bg-black/50 border border-gray-200 dark:border-gray-600 rounded-xl text-xs font-bold">
                </div>
            </div>

            <div class="flex justify-between items-center mb-2 pb-2 border-b border-gray-200 dark:border-gray-700">
                <h3 class="font-black text-gray-800 dark:text-gray-200">Pesanan Semasa</h3>
                <span class="text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded-md font-bold cursor-pointer hover:bg-red-200" onclick="clearCart()">Kosongkan</span>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto custom-scroll space-y-1 mb-4 pr-1">
                </div>

            <div class="flex gap-2 mb-4 bg-gray-50 dark:bg-gray-800/50 p-2 rounded-xl border border-gray-100 dark:border-gray-700">
                <input type="text" id="pos-coupon" placeholder="Kod Kupon (Jika ada)" class="flex-1 p-2 bg-transparent text-sm uppercase font-bold outline-none">
                <button onclick="applyPosCoupon()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 rounded-lg text-xs font-bold transition shadow-sm"><i class="fas fa-tag"></i> GUNA</button>
            </div>

            <div class="bg-gray-800 dark:bg-gray-900 text-white p-4 rounded-2xl shadow-inner mb-4">
                <div class="flex justify-between text-sm mb-1 text-gray-300"><span>Subtotal:</span><span id="cart-total">RM 0.00</span></div>
                <div class="flex justify-between text-sm text-red-400 mb-2 border-b border-gray-700 pb-2" id="discount-row" style="display:none;"><span>Diskaun:</span><span id="cart-discount">- RM 0.00</span></div>
                <div class="flex justify-between items-end">
                    <span class="text-xs font-bold text-emerald-400 uppercase tracking-widest">Grand Total</span>
                    <span id="cart-grand" class="text-3xl font-black tracking-tighter">RM 0.00</span>
                </div>
            </div>

            <div class="space-y-3">
                <div class="flex gap-2 items-center">
                    <div class="bg-gray-100 dark:bg-gray-800 px-3 py-3 rounded-xl font-bold text-gray-500">Tunai</div>
                    <input type="number" id="cash-paid" class="flex-1 p-3 bg-white dark:bg-black/50 border-2 border-gray-200 dark:border-gray-600 rounded-xl text-lg font-black text-right outline-none focus:border-emerald-500 transition" placeholder="0.00" oninput="calculateChange()">
                </div>
                
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="setQuickCash('exact')" class="bg-blue-100 hover:bg-blue-200 text-blue-700 py-2 rounded-lg text-xs font-black transition">TEPAT</button>
                    <button onclick="setQuickCash(20)" class="bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 py-2 rounded-lg text-xs font-black transition">RM20</button>
                    <button onclick="setQuickCash(50)" class="bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 py-2 rounded-lg text-xs font-black transition">RM50</button>
                    <button onclick="setQuickCash(100)" class="bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 py-2 rounded-lg text-xs font-black transition">RM100</button>
                </div>

                <div class="flex justify-between items-center bg-emerald-50 dark:bg-emerald-900/30 p-3 rounded-xl border border-emerald-100 dark:border-emerald-800">
                    <span class="text-sm font-bold text-emerald-700 dark:text-emerald-400 uppercase">Baki Pulangan:</span>
                    <span id="change-amount" class="text-xl font-black text-emerald-600 dark:text-emerald-300">RM 0.00</span>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-2 mt-4">
                <button onclick="printReceipt()" class="col-span-1 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-white py-3 rounded-xl font-bold hover:bg-gray-300 dark:hover:bg-gray-600 transition"><i class="fas fa-print text-lg"></i></button>
                <button onclick="completeSale()" class="col-span-3 bg-gradient-to-r from-emerald-500 to-teal-500 text-white py-3 rounded-xl font-black text-lg shadow-lg shadow-emerald-200 dark:shadow-none hover:scale-[1.02] transition active:scale-95"><i class="fas fa-check-circle mr-2"></i> SELESAI (BAYAR)</button>
            </div>
        </div>
    </div>
</div>
